<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Sales Insights</title>
<script src="https://quicklytics.quick.shopify.io/quicklytics.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()</script>
<style>
:root {
  --bg: #fefcf9;
  --bg-card: #ffffff;
  --bg-muted: #f5f4f1;
  --accent: #008060;
  --accent-light: #edf8f3;
  --accent-soft: #b8e6d0;
  --accent2: #5c6ac4;
  --accent2-light: #f0f1fc;
  --accent2-soft: #c8ccf0;
  --warm: #d97706;
  --warm-light: #fef8ee;
  --warm-soft: #fcd980;
  --rose: #be185d;
  --rose-light: #fef1f6;
  --rose-soft: #f5b8d4;
  --text-1: #2d2a26;
  --text-2: #5c5852;
  --text-3: #78736a;
  --border: #ece8e1;
  --shadow: 0 2px 10px rgba(45,42,38,.05), 0 1px 3px rgba(45,42,38,.04);
  --shadow-lg: 0 8px 28px rgba(45,42,38,.08), 0 4px 10px rgba(45,42,38,.04);
  --shadow-warm: 0 4px 16px rgba(217,119,6,.06);
  --font: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --max-w: 1060px;
  --radius: 16px;
  --radius-sm: 12px;
}
html.dark {
  --bg: #1a1917;
  --bg-card: #242220;
  --bg-muted: #2d2a27;
  --accent-light: #0f2e22;
  --accent-soft: #1a4a36;
  --accent2-light: #1c1e42;
  --accent2-soft: #2e3270;
  --warm-light: #2a2010;
  --warm-soft: #4a3810;
  --rose-light: #2a1020;
  --rose-soft: #4a1830;
  --text-1: #f0ede8;
  --text-2: #b8b3aa;
  --text-3: #8a8479;
  --border: #3a3733;
  --shadow: 0 2px 10px rgba(0,0,0,.2), 0 1px 3px rgba(0,0,0,.15);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.3), 0 4px 10px rgba(0,0,0,.2);
  --shadow-warm: 0 4px 16px rgba(217,119,6,.15);
}
.theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 300;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: var(--shadow);
  transition: transform .2s, border-color .2s;
}
.theme-toggle:hover { transform: scale(1.1); border-color: var(--accent); }
.theme-toggle svg { width: 18px; height: 18px; stroke: var(--text-2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
html:not(.dark) .icon-sun { display: none; }
html.dark .icon-moon { display: none; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text-1);
  font-size: 16px; line-height: 1.8; -webkit-font-smoothing: antialiased;
  overflow-x: hidden; min-height: 100vh;
}
.progress-ring-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 200; width: 44px; height: 44px;
}
.progress-ring { transform: rotate(-90deg); }
.progress-ring-bg { stroke: var(--border); }
.progress-ring-fill {
  stroke: var(--accent); stroke-dasharray: 113; stroke-dashoffset: 113;
  transition: stroke-dashoffset 80ms linear;
}
.wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 28px; }

/* ── HERO compact ── */
.hero-compact {
  text-align: center; padding: 56px 28px 28px; position: relative;
}
.hero-compact::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.hero-compact .hero-greeting {
  font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--accent); margin-bottom: 4px;
}
.hero-compact h1 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; color: var(--text-1); letter-spacing: -.02em;
}
.hero-compact .sub {
  font-size: 15px; color: var(--text-2); margin-top: 8px; font-weight: 400; line-height: 1.7;
}
.hero-compact .sub strong { color: var(--accent); }

/* ── Personal hero ── */
.hero-personal {
  text-align: center; padding: 28px 28px 36px; position: relative;
}
.hero-personal::before {
  content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,128,96,.07) 0%, rgba(92,106,196,.04) 30%, rgba(217,119,6,.03) 50%, transparent 70%);
  pointer-events: none;
}
.hero-personal::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-light), var(--accent-soft));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 28px; color: var(--accent);
  margin: 0 auto 16px; box-shadow: 0 4px 20px rgba(0,128,96,.12);
}
.hero-personal h1 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: clamp(2rem, 5vw, 3.2rem); color: var(--text-1); letter-spacing: -.02em;
}
.hero-personal .sub-personal {
  font-size: 16px; color: var(--text-2); margin-top: 10px; line-height: 1.7;
}
.hero-personal .sub-personal strong { color: var(--accent); font-weight: 600; }
.hero-personal .motivator {
  display: inline-block; margin-top: 14px; padding: 8px 20px;
  background: var(--accent-light); border-radius: 24px; font-size: 14px; font-weight: 500; color: var(--accent);
}

/* ── Start here callout ── */
.start-here {
  background: var(--bg-card); border: 1px solid var(--border);
  border-left: 4px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 24px 28px; margin-bottom: 36px; box-shadow: var(--shadow);
}
.start-here-label {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.start-here-title {
  font-family: var(--font-serif); font-size: 20px; font-weight: 400; color: var(--text-1); margin-bottom: 4px;
}
.start-here-body { font-size: 14px; color: var(--text-2); line-height: 1.7; }

/* ── Sections ── */
.section-wrap { padding: 36px 0; position: relative; }
.section-wrap::after {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.section-wrap:last-of-type::after { display: none; }
.section-emoji { font-size: 24px; margin-bottom: 6px; }
.section-kicker { font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.section-head {
  font-family: var(--font-serif); font-size: clamp(1.5rem, 3vw, 2rem);
  font-weight: 400; color: var(--text-1); margin-bottom: 6px; letter-spacing: -.01em;
}
.section-deck { font-size: 15px; color: var(--text-2); line-height: 1.7; max-width: 600px; margin-bottom: 24px; }

/* ── Filters ── */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.filter-tag {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 16px; border: 1px solid var(--border); border-radius: 24px;
  background: var(--bg-card); color: var(--text-3); cursor: pointer;
  transition: all .2s; box-shadow: var(--shadow);
}
.filter-tag:hover { border-color: var(--accent); color: var(--accent); }
.filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.seller-card.hidden { display: none; }

/* ── Help btn ── */
.help-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg);
  font-family: var(--font); font-size: 11px; font-weight: 700;
  color: var(--text-3); cursor: pointer; transition: all .15s;
  vertical-align: middle; margin-left: 4px;
}
.help-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(45,42,38,.35);
  backdrop-filter: blur(4px); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 32px 36px; max-width: 480px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  transform: translateY(12px) scale(.98);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
.modal-close {
  float: right; border: none; background: transparent;
  font-size: 20px; color: var(--text-3); cursor: pointer; padding: 0; line-height: 1; transition: color .15s;
}
.modal-close:hover { color: var(--text-1); }
.modal-badge { margin-bottom: 12px; }
.modal-title { font-family: var(--font-serif); font-size: 22px; font-weight: 400; color: var(--text-1); margin-bottom: 12px; }
.modal-body { font-size: 15px; color: var(--text-2); line-height: 1.8; }

/* ── Top signals row ── */
.top-scroll-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.top-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow); min-width: 0;
  transition: transform .35s cubic-bezier(.16,1,.3,1), box-shadow .3s;
}
.top-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.top-rank-wrap { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.top-rank {
  display: inline-flex; width: 26px; height: 26px; align-items: center;
  justify-content: center; border-radius: 50%; font-size: 12px; font-weight: 700; color: #fff;
}
.top-rank-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 2px 7px; border-radius: 4px; }
.rank-bg-1 { background: var(--accent); }
.rank-bg-2 { background: var(--rose); }
.rank-bg-3 { background: var(--accent2); }
.rank-bg-4 { background: var(--warm); }
.rank-bg-5 { background: var(--accent); }
.rank-label-hvp { background: var(--rose-light); color: var(--rose); }
.rank-label-mqa { background: var(--accent-light); color: var(--accent); }
.rank-label-new_people { background: var(--accent2-light); color: var(--accent2); }
.rank-label-activity { background: var(--warm-light); color: var(--warm); }
.top-title { font-family: var(--font-serif); font-size: 17px; font-weight: 400; color: var(--text-1); margin-bottom: 4px; line-height: 1.3; }
.top-meta { font-size: 13px; color: var(--text-2); margin-bottom: 3px; }
.top-kw { font-size: 12px; color: var(--warm); font-style: italic; margin-bottom: 6px; }
.top-owner { font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; }
.top-owner:hover { text-decoration: underline; }

/* ── Seller grid ── */
.sellers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.seller-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; cursor: pointer; box-shadow: var(--shadow);
  transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s, border-color .3s;
}
.seller-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent-soft); }
.seller-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.seller-name { font-family: var(--font-serif); font-size: 19px; font-weight: 400; }
.seller-total { font-size: 12px; font-weight: 600; color: var(--accent); padding: 2px 10px; background: var(--accent-light); border-radius: 10px; }
.seller-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.pill-mqa { background: var(--accent-light); color: var(--accent); }
.pill-hvp { background: var(--rose-light); color: var(--rose); }
.pill-people,.pill-new_people { background: var(--accent2-light); color: var(--accent2); }
.pill-activity { background: var(--warm-light); color: var(--warm); }

/* ── Coming soon ── */
.coming-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.coming-card { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; background: var(--bg-muted); position: relative; opacity: .8; }
.coming-icon { font-size: 28px; margin-bottom: 8px; }
.coming-title { font-family: var(--font-serif); font-size: 18px; font-weight: 400; color: var(--text-1); margin-bottom: 4px; }
.coming-desc { font-size: 14px; color: var(--text-3); line-height: 1.6; }
.coming-badge { position: absolute; top: 16px; right: 16px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; background: var(--border); color: var(--text-3); font-weight: 500; }
.coming-cta { margin-top: 20px; font-size: 14px; color: var(--text-3); font-style: italic; }
.coming-cta strong { color: var(--accent); font-style: normal; }

/* ── Stats (personal) ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 36px; }
.stat-card { border-radius: var(--radius); padding: 24px 16px; text-align: center; box-shadow: var(--shadow); transition: transform .25s ease; position: relative; }
.stat-card:hover { transform: scale(1.03); }
.stat-card-muted { background: var(--bg-muted); opacity: .6; }
.stat-card-muted .stat-num { color: var(--text-3) !important; }
.stat-card-muted .stat-label,.stat-card-muted .stat-vibe { color: var(--text-3); }
.stat-card-low-mqa { background: var(--accent-light); }
.stat-card-low-hvp { background: var(--rose-light); }
.stat-card-low-people,.stat-card-low-new_people { background: var(--accent2-light); }
.stat-card-low-activity { background: var(--warm-light); }
.stat-card-high-mqa { background: linear-gradient(145deg, var(--accent-light), var(--accent-soft)); box-shadow: 0 4px 20px rgba(0,128,96,.12); }
.stat-card-high-hvp { background: linear-gradient(145deg, var(--rose-light), var(--rose-soft)); box-shadow: 0 4px 20px rgba(190,24,93,.1); }
.stat-card-high-people,.stat-card-high-new_people { background: linear-gradient(145deg, var(--accent2-light), var(--accent2-soft)); box-shadow: 0 4px 20px rgba(92,106,196,.1); }
.stat-card-high-activity { background: linear-gradient(145deg, var(--warm-light), var(--warm-soft)); box-shadow: 0 4px 20px rgba(217,119,6,.1); }
.stat-crown { position: absolute; top: -8px; right: -4px; font-size: 18px; }
.stat-num { font-family: var(--font-serif); font-size: 44px; font-weight: 400; line-height: 1; }
.stat-num-mqa { color: var(--accent); }
.stat-num-hvp { color: var(--rose); }
.stat-num-people,.stat-num-new_people { color: var(--accent2); }
.stat-num-activity { color: var(--warm); }
.stat-label { font-size: 13px; color: var(--text-2); margin-top: 6px; font-weight: 500; }
.stat-vibe { font-size: 11px; color: var(--text-3); margin-top: 2px; font-style: italic; }

/* ── Tables ── */
.signal-section { margin-bottom: 40px; }
.signal-heading { font-family: var(--font-serif); font-size: 22px; font-weight: 400; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.signal-desc { font-size: 14px; color: var(--text-3); margin-bottom: 14px; line-height: 1.7; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-mqa { background: var(--accent-light); color: var(--accent); }
.badge-hvp { background: var(--rose-light); color: var(--rose); }
.badge-people,.badge-new_people { background: var(--accent2-light); color: var(--accent2); }
.badge-activity { background: var(--warm-light); color: var(--warm); }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; background: var(--bg-card); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow); min-width: 600px; }
.data-table th { background: var(--bg); text-align: left; padding: 12px 16px; border-bottom: 2px solid var(--border); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-2); white-space: nowrap; }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.6; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,128,96,.03); }
.table-wrap { overflow-x: auto; margin-bottom: 4px; border-radius: var(--radius-sm); -webkit-overflow-scrolling: touch; }
.row-explain { background: var(--bg); }
.row-explain td { padding: 8px 16px 10px !important; border-bottom: 1px solid var(--border) !important; }
.row-explain-inner { font-size: 13px; color: var(--text-3); font-style: italic; line-height: 1.6; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.wow-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; font-style: normal; padding: 2px 8px; border-radius: 10px; }
.wow-repeat { background: var(--warm-light); color: var(--warm); }
.wow-up { background: var(--accent-light); color: var(--accent); }
.wow-down { background: var(--bg-muted); color: var(--text-3); }

/* ── Archive ── */
.archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.archive-link {
  display: flex; flex-direction: column; gap: 4px;
  padding: 18px 22px; background: var(--bg-card);
  border: 1px solid var(--border); border-left: 3px solid var(--border);
  border-radius: var(--radius-sm); box-shadow: var(--shadow); cursor: pointer; transition: all .2s;
}
.archive-link:hover { transform: translateY(-2px); border-left-color: var(--accent); box-shadow: var(--shadow-lg); }
.archive-link.current { border-left-color: var(--accent); background: var(--accent-light); }
.archive-link.viewing { border-left-color: var(--warm); background: var(--warm-light); }
.archive-week-label { font-family: var(--font-serif); font-size: 17px; font-weight: 400; color: var(--text-1); }
.archive-meta { font-size: 13px; color: var(--text-3); font-weight: 400; }
.archive-tag { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 8px; font-weight: 600; margin-left: 8px; vertical-align: middle; }
.archive-tag-current { background: var(--accent); color: #fff; }
.archive-tag-viewing { background: var(--warm); color: #fff; }
.archive-empty { display: flex; align-items: center; gap: 12px; color: var(--text-3); font-size: 15px; padding: 20px; background: var(--bg-muted); border-radius: var(--radius-sm); border: 1px dashed var(--border); grid-column: 1 / -1; }
.archive-banner { position: sticky; top: 0; z-index: 90; background: var(--warm-light); border-bottom: 1px solid rgba(217,119,6,.2); padding: 10px 20px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 14px; color: var(--text-2); text-align: center; flex-wrap: wrap; }
.archive-banner strong { color: var(--warm); }
.archive-banner-btn { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 6px 16px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: transform .2s; }
.archive-banner-btn:hover { transform: scale(1.05); }

/* ── Identity notice ── */
.identity-notice { background: var(--accent-light); border-radius: var(--radius-sm); padding: 12px 20px; font-size: 14px; color: var(--text-2); margin-bottom: 28px; text-align: center; }
.identity-notice a { color: var(--accent); font-weight: 600; }

/* ── Search (unidentified users) ── */
.search-area { padding-top: 24px; padding-bottom: 8px; position: sticky; top: 0; z-index: 100; background: var(--bg); }
.search-box { position: relative; }
.search-box svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-3); }
.search-input { width: 100%; padding: 14px 18px 14px 46px; font-family: var(--font); font-size: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-1); outline: none; box-shadow: var(--shadow); transition: border-color .2s, box-shadow .2s; }
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,128,96,.12), var(--shadow); }
.search-results { display: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.12); max-height: 420px; overflow-y: auto; }
.search-results.active { display: block; }
.sr-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--accent-light); }
.sr-name { font-family: var(--font-serif); font-weight: 400; font-size: 18px; }
.sr-pills { display: flex; gap: 6px; }
.sr-empty { padding: 20px; text-align: center; color: var(--text-3); font-size: 15px; }
.notice { background: var(--warm-light); border: 1px solid rgba(217,119,6,.2); border-left: 3px solid var(--warm); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 16px; margin-top: 12px; font-size: 13px; line-height: 1.6; color: var(--text-2); }
.notice strong { color: var(--warm); }

/* ── Footer ── */
.footer { text-align: center; font-size: 12px; color: var(--text-3); padding: 36px 0 56px; border-top: 1px solid var(--border); margin-top: 24px; }

/* ── Loading ── */
#loadingView { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
#loadingView .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingView p { color: var(--text-3); font-size: 15px; }

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px) scale(.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
.fade-in { animation: fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
.fd2 { animation-delay: .12s; } .fd3 { animation-delay: .24s; } .fd4 { animation-delay: .36s; }
.reveal { opacity: 0; transform: translateY(20px) scale(.99); transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1); }
.reveal.visible { opacity: 1; transform: translateY(0) scale(1); }
@media (prefers-reduced-motion: reduce) { .fade-in, .reveal { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; } }

/* ── Tablet (≤900px) ── */
@media (max-width: 900px) {
  .top-scroll-row { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; gap: 12px; padding-bottom: 8px; }
  .top-scroll-row::-webkit-scrollbar { display: none; }
  .top-card { min-width: 240px; flex-shrink: 0; scroll-snap-align: start; }
  .filter-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-tag { flex-shrink: 0; min-height: 44px; display: inline-flex; align-items: center; padding: 10px 18px; }
  .help-btn { width: 28px; height: 28px; font-size: 13px; }
}

/* ── Phone (≤700px) ── */
@media (max-width: 700px) {
  .wrap { padding: 0 20px; }
  .hero-compact { padding: 36px 20px 20px; }
  .hero-personal { padding: 20px 20px 28px; }
  .hero-compact h1 { font-size: 1.8rem; }
  .hero-personal h1 { font-size: 1.8rem; }
  .hero-personal::before { width: 280px; height: 280px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .sellers-grid { grid-template-columns: 1fr; }
  .coming-grid { grid-template-columns: 1fr; }
  .seller-card { padding: 18px; }
  .sr-item { padding: 16px 18px; min-height: 52px; }
  .archive-link { padding: 16px 20px; min-height: 52px; }
  .data-table { font-size: 13px; }
  .data-table th { padding: 10px 12px; font-size: 10px; }
  .data-table td { padding: 10px 12px; }
  .section-head { font-size: 1.4rem; }
  .section-wrap { padding: 28px 0; }
  .top-card { min-width: 220px; padding: 16px; }
  .modal-box { padding: 24px; width: 94%; }
  .avatar { width: 56px; height: 56px; font-size: 22px; }
  .progress-ring-wrap { bottom: 16px; right: 16px; width: 38px; height: 38px; }
}

/* ── Small phone (≤480px) ── */
@media (max-width: 480px) {
  .wrap { padding: 0 16px; }
  .hero-compact { padding: 24px 16px 16px; }
  .hero-personal { padding: 16px 16px 20px; }
  .hero-compact h1 { font-size: 1.5rem; }
  .hero-personal h1 { font-size: 1.5rem; }
  .hero-personal::before { width: 220px; height: 220px; }
  .stats-grid { gap: 8px; }
  .stat-card { padding: 16px 10px; }
  .stat-num { font-size: 32px; }
  .stat-label { font-size: 12px; }
  .section-wrap { padding: 20px 0; }
  .section-head { font-size: 1.25rem; }
  .top-card { min-width: 200px; padding: 14px; }
  .top-title { font-size: 15px; }
  .signal-heading { font-size: 18px; }
  .data-table { font-size: 12px; min-width: 480px; }
  .data-table th { padding: 8px 10px; }
  .data-table td { padding: 8px 10px; line-height: 1.5; }
  .coming-card { padding: 18px; }
  .filter-tag { padding: 10px 14px; font-size: 13px; }
  .progress-ring-wrap { bottom: 12px; right: 12px; width: 34px; height: 34px; }
  .theme-toggle { width: 36px; height: 36px; top: 12px; right: 12px; }
  .theme-toggle svg { width: 16px; height: 16px; }
  .modal-box { padding: 20px; }
  .search-area { padding-top: 16px; }
}

/* ── Accessibility ── */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
.skip-link { position: absolute; top: -100px; left: 16px; z-index: 999; padding: 12px 24px; background: var(--accent); color: #fff; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; text-decoration: none; transition: top .2s; }
.skip-link:focus { top: 16px; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
:focus:not(:focus-visible) { outline: none; }
.filter-group { display: inline-flex; align-items: stretch; }
.filter-group .filter-tag { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: 0; }
.filter-group .help-btn { border-radius: 0 24px 24px 0; border-top-left-radius: 0; border-bottom-left-radius: 0; }
@media (max-width: 900px) {
  .filter-group { flex-shrink: 0; }
  .filter-group .filter-tag { min-height: 44px; display: inline-flex; align-items: center; }
}
</style>
</head>
<body>

<a href="#mainContent" class="skip-link">Skip to content</a>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<svg class="progress-ring-wrap" viewBox="0 0 40 40" aria-hidden="true">
  <circle class="progress-ring-bg" cx="20" cy="20" r="18" fill="none" stroke-width="2" />
  <circle class="progress-ring progress-ring-fill" id="progressRing" cx="20" cy="20" r="18" fill="none" stroke-width="2.5" stroke-linecap="round" />
</svg>

<main id="mainContent">
<div id="masterView" style="display:none"></div>
<div id="personalView" style="display:none"></div>
</main>
<div id="loadingView" role="status" aria-label="Loading"><div class="spinner"></div><p>Loading insights&hellip;</p></div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
(function() {
'use strict';

var DATA = null;
var WEEKS = [];
var CURRENT_SELLER = null;
var ACTIVE_FILTER = 'all';
var CURRENT_WEEK = null;
var IAP_EMAIL = null;
var IDENTITY_ROLE = null;
var IDENTITY_DATA = null;
var LATEST_WEEK = null;
var modalTrigger = null;

var $ = function(s) { return document.querySelector(s); };
var $$ = function(s) { return document.querySelectorAll(s); };
var STORAGE_KEY = 'sales-insights-seller';

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var TYPE_CLS = { mqa:'mqa', hvp:'hvp', new_people:'new_people', activity:'activity' };
var RANK_BG = ['rank-bg-1','rank-bg-2','rank-bg-3','rank-bg-4','rank-bg-5'];
var STAT_VIBES = { mqa:'accounts raising their hand', hvp:'reconsidering Shopify', new_people:'fresh contacts this week', activity:'actions they took' };

function badgeCls(t) { return 'badge-' + (TYPE_CLS[t] || t); }
function pillCls(t) { return 'pill-' + (TYPE_CLS[t] || t); }

function getGreeting() {
  var h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function getFirstName() {
  if (IAP_EMAIL) {
    var parts = IAP_EMAIL.split('@')[0].split('.');
    if (parts.length > 0) return parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
  }
  return '';
}

var SIGNAL_DEFS = {
  mqa: { q:"What's an MQA?", a:'Think of it as an account raising its hand. An MQA crossed a big engagement threshold through marketing alone \u2014 no sales touches. These accounts are warm and waiting for you to reach out.' },
  hvp: { q:'What does HVP mean?', a:'These are accounts that previously said no (Closed Lost) but are back on Shopify Plus pages this week. They\u2019re reconsidering. The timing is perfect to re-engage.' },
  new_people: { q:'Who are these new people?', a:'Brand-new contacts from key titles (marketing, ecommerce, C-suite) who engaged with Shopify for the first time this week. Fresh leads who weren\u2019t on your radar before.' },
  activity: { q:'What are these activities?', a:'The specific things (webinars, events, email clicks, form fills) that drove engagement from new contacts. Use these details to personalize your outreach and start real conversations.' }
};

function openModal(type) {
  var st = DATA.signal_types[type];
  var def = SIGNAL_DEFS[type];
  if (!st || !def) return;
  var cls = TYPE_CLS[type] || type;
  var html = '<div class="modal-badge"><span class="badge badge-' + cls + '">' + esc(st.short_label) + '</span></div>';
  html += '<div class="modal-title" id="modalTitle">' + esc(def.q) + '</div>';
  html += '<div class="modal-body">' + esc(def.a) + '</div>';
  $('#modalContent').innerHTML = html;
  modalTrigger = document.activeElement;
  $('#modalOverlay').classList.add('open');
  $('#modalClose').focus();
}
function closeModal() {
  $('#modalOverlay').classList.remove('open');
  if (modalTrigger && modalTrigger.focus) { modalTrigger.focus(); }
  modalTrigger = null;
}

/* ═══════════════════════════════════════════
   Identity — GCP IAP
   ═══════════════════════════════════════════ */
function fetchIAPEmail() {
  var base = location.origin + location.pathname;
  return fetch(base + '?gcp-iap-mode=IDENTITY', {
    credentials: 'same-origin', headers: { 'Accept': 'application/json' }, redirect: 'follow'
  })
  .then(function(r) { if (!r.ok) return null; return r.text(); })
  .then(function(text) {
    if (!text) return null;
    try {
      var data = JSON.parse(text);
      if (data && data.email) {
        var email = data.email.replace('accounts.google.com:', '');
        console.log('[Identity] IAP resolved:', email);
        return email;
      }
    } catch (e) {}
    return null;
  })
  .catch(function() { return null; });
}

function resolveRole(email) {
  if (!email || !DATA.identity) return;
  var ident = DATA.identity;
  var emailLower = email.toLowerCase();
  if (ident.admins.indexOf(emailLower) !== -1) { IDENTITY_ROLE = 'admin'; IDENTITY_DATA = null; return; }
  if (ident.coaches && ident.coaches[emailLower]) { IDENTITY_ROLE = 'coach'; IDENTITY_DATA = ident.coaches[emailLower]; return; }
  if (ident.seller_emails && ident.seller_emails[emailLower]) { IDENTITY_ROLE = 'seller'; IDENTITY_DATA = ident.seller_emails[emailLower]; return; }
}

function resolveIdentity() {
  var params = new URLSearchParams(location.search);
  var sellerParam = params.get('seller');
  if (sellerParam && DATA.sellers[sellerParam]) return sellerParam;
  if (IDENTITY_ROLE === 'admin' || IDENTITY_ROLE === 'coach') return null;
  if (IDENTITY_ROLE === 'seller' && IDENTITY_DATA && DATA.sellers[IDENTITY_DATA]) return IDENTITY_DATA;
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved && DATA.sellers[saved]) return saved;
  return null;
}

function saveSeller(id) { localStorage.setItem(STORAGE_KEY, id); }
function clearSeller() { localStorage.removeItem(STORAGE_KEY); }

function updateURL(sellerId) {
  var params = new URLSearchParams(location.search);
  if (sellerId) { params.set('seller', sellerId); } else { params.delete('seller'); }
  var qs = params.toString();
  history.pushState({ seller: sellerId }, '', location.pathname + (qs ? '?' + qs : ''));
}

/* ═══════════════════════════════════════════
   Navigation
   ═══════════════════════════════════════════ */
function showSeller(sellerId) {
  if (!DATA.sellers[sellerId]) return showMaster();
  CURRENT_SELLER = sellerId;
  if (IDENTITY_ROLE !== 'admin' && IDENTITY_ROLE !== 'coach') saveSeller(sellerId);
  updateURL(sellerId);
  renderPersonal(sellerId);
  $('#masterView').style.display = 'none';
  $('#personalView').style.display = 'block';
  window.scrollTo(0, 0);
  initReveal();
}

function showMaster() {
  CURRENT_SELLER = null;
  updateURL(null);
  renderMaster();
  $('#personalView').style.display = 'none';
  $('#masterView').style.display = 'block';
  window.scrollTo(0, 0);
  initReveal();
}

window.addEventListener('popstate', function(e) {
  var sellerId = (e.state && e.state.seller) ? e.state.seller : null;
  if (sellerId && DATA && DATA.sellers[sellerId]) {
    CURRENT_SELLER = sellerId;
    renderPersonal(sellerId);
    $('#masterView').style.display = 'none';
    $('#personalView').style.display = 'block';
  } else {
    CURRENT_SELLER = null;
    renderMaster();
    $('#personalView').style.display = 'none';
    $('#masterView').style.display = 'block';
  }
  initReveal();
});

/* ═══════════════════════════════════════════
   Render: Master
   ═══════════════════════════════════════════ */
function renderMaster() {
  var m = DATA.meta;
  var types = Object.keys(DATA.signal_types);
  var sellers = DATA.sellers;
  var sellerIds = Object.keys(sellers);

  var totals = {};
  types.forEach(function(t) { totals[t] = 0; });
  sellerIds.forEach(function(sid) {
    types.forEach(function(t) { totals[t] += sellers[sid].summary[t] || 0; });
  });

  var firstName = getFirstName();
  var greetName = firstName ? ', ' + firstName : '';

  var html = '';
  var isArchive = CURRENT_WEEK !== LATEST_WEEK;
  if (isArchive) {
    html += '<div class="archive-banner"><strong>\uD83D\uDCC5 Viewing week of ' + esc(CURRENT_WEEK) + '</strong>';
    html += '<button class="archive-banner-btn" id="backToCurrentBtn">Back to current week</button></div>';
  }
  html += '<header><div class="hero-compact">';
  html += '<div class="hero-greeting fade-in">' + getGreeting() + greetName + '</div>';
  html += '<h1 class="fade-in fd2">Weekly Sales Insights</h1>';
  html += '<div class="sub fade-in fd3"><strong>' + m.total_sellers + ' sellers</strong> \u00B7 ' + m.sellers_with_signals + ' with signals \u00B7 Week of ' + esc(m.week_of) + '</div>';
  html += '</div></header>';

  html += '<div class="wrap section-wrap">';

  // Search for unidentified users
  if (!IDENTITY_ROLE) {
    html += '<div class="search-area"><div class="search-box">';
    html += '<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="9" cy="9" r="6"/><line x1="14" y1="14" x2="18" y2="18"/></svg>';
    html += '<input class="search-input" type="text" placeholder="Type your name here to find your report..." id="hubSearch" autocomplete="off" aria-label="Search for your name">';
    html += '</div><div class="search-results" id="searchResults" role="listbox" aria-live="polite"></div></div>';
  }

  // Filters
  html += '<div class="filter-bar reveal" role="toolbar" aria-label="Signal type filters">';
  html += '<button class="filter-tag active" data-filter="all">All Signals</button>';
  types.forEach(function(t) {
    var st = DATA.signal_types[t];
    html += '<span class="filter-group"><button class="filter-tag" data-filter="' + t + '">' + esc(st.short_label) + ' (' + totals[t] + ')</button><button class="help-btn" data-help="' + t + '" aria-label="What is ' + esc(st.short_label) + '?">?</button></span>';
  });
  html += '</div>';

  // Notice for unidentified
  if (!IDENTITY_ROLE) {
    html += '<div class="notice"><strong>Don\'t see your name?</strong> That means none of your accounts had engagement signals this week. Check back next Monday.</div>';
  }

  // Top signals
  html += '<div style="margin-top:28px;"><div class="section-emoji reveal">\uD83D\uDD25</div>';
  html += '<div class="section-kicker reveal">Hottest this week</div>';
  html += '<div class="section-head reveal">Accounts You Should Know About</div>';
  html += '<div class="section-deck reveal">Strongest engagement signals this week. If any are yours, they\u2019re worth a touchpoint.</div>';
  html += '<div class="top-scroll-row">';
  DATA.highlights.forEach(function(h, i) {
    var labelCls = 'rank-label-' + h.type;
    html += '<div class="top-card reveal">';
    html += '<div class="top-rank-wrap"><span class="top-rank ' + RANK_BG[i % RANK_BG.length] + '">' + (i+1) + '</span>';
    html += '<span class="top-rank-label ' + labelCls + '">' + esc(h.type).toUpperCase() + '</span></div>';
    html += '<div class="top-title">' + esc(h.title) + '</div>';
    html += '<div class="top-meta">' + esc(h.subtitle) + '</div>';
    if (h.detail) html += '<div class="top-kw">' + esc(h.detail) + '</div>';
    if (h.seller_name && h.seller_id) {
      html += '<div class="top-owner" data-seller="' + esc(h.seller_id) + '" tabindex="0" role="link" aria-label="View ' + esc(h.seller_name) + ' report">\u2192 ' + esc(h.seller_name) + '</div>';
    }
    html += '</div>';
  });
  html += '</div></div></div>';

  // Sellers
  html += '<div class="wrap section-wrap">';
  html += '<div class="section-emoji reveal">\uD83D\uDC65</div>';
  html += '<div class="section-kicker reveal">Your team</div>';
  html += '<div class="section-head reveal">See What Each Seller Has This Week</div>';
  html += '<div class="section-deck reveal">Click any name to see their full personalized report.</div>';
  html += '<div class="sellers-grid" id="sellersGrid">';

  sellerIds.sort(function(a, b) { return sellers[a].name.localeCompare(sellers[b].name); });
  sellerIds.forEach(function(sid) {
    var s = sellers[sid];
    if (s.summary.total === 0) return;
    var typesPresent = types.filter(function(t) { return s.summary[t] > 0; }).join(' ');
    html += '<div class="seller-card reveal" data-seller="' + esc(sid) + '" data-name="' + esc(s.name.toLowerCase()) + '" data-types="' + typesPresent + '" tabindex="0" role="button" aria-label="View ' + esc(s.name) + ' report">';
    html += '<div class="seller-head"><span class="seller-name">' + esc(s.name) + '</span><span class="seller-total">' + s.summary.total + ' signals</span></div>';
    html += '<div class="seller-pills">';
    types.forEach(function(t) {
      if (s.summary[t] > 0) html += '<span class="pill ' + pillCls(t) + '">' + s.summary[t] + ' ' + DATA.signal_types[t].short_label + '</span>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  html += '<div id="noResults" style="display:none;text-align:center;color:var(--text-3);padding:48px 0;font-size:15px;" aria-live="polite">No sellers match your search.</div>';
  html += '</div>';

  // Archive
  html += '<div class="wrap section-wrap">';
  html += '<div class="section-emoji reveal">\uD83D\uDCC5</div>';
  html += '<div class="section-kicker reveal">Weekly archive</div>';
  html += '<div class="section-head reveal">Browse Past Weeks</div>';
  html += '<div class="section-deck reveal">Each week is saved so you can always go back and review.</div>';
  html += '<div class="archive-grid reveal">';

  var isViewingLatest = CURRENT_WEEK === LATEST_WEEK;
  html += '<div class="archive-link' + (isViewingLatest ? ' current' : '') + '" data-week="' + esc(LATEST_WEEK) + '" tabindex="0" role="button" aria-label="Load current week">';
  html += '<div><span class="archive-week-label">Week of ' + esc(LATEST_WEEK) + '</span><span class="archive-tag archive-tag-current">Current</span></div>';
  if (isViewingLatest) {
    html += '<div class="archive-meta">' + m.total_sellers + ' sellers \u00B7 ' + m.sellers_with_signals + ' with signals</div>';
  }
  html += '</div>';

  var pastWeeks = WEEKS.filter(function(w) { return w !== LATEST_WEEK; });
  pastWeeks.forEach(function(w) {
    var isViewing = w === CURRENT_WEEK;
    html += '<div class="archive-link' + (isViewing ? ' viewing' : '') + '" data-week="' + esc(w) + '" tabindex="0" role="button" aria-label="Load week of ' + esc(w) + '">';
    html += '<div><span class="archive-week-label">Week of ' + esc(w) + '</span>';
    if (isViewing) html += '<span class="archive-tag archive-tag-viewing">Viewing</span>';
    html += '</div></div>';
  });

  if (pastWeeks.length === 0 && WEEKS.length <= 1) {
    html += '<div class="archive-empty"><span aria-hidden="true">\uD83D\uDCC5</span><span>No previous weeks yet \u2014 check back next Monday!</span></div>';
  }
  html += '</div></div>';

  // Coming Soon
  html += '<div class="wrap section-wrap">';
  html += '<div class="section-emoji reveal">\uD83D\uDE80</div>';
  html += '<div class="section-kicker reveal">Coming soon</div>';
  html += '<div class="section-head reveal">More Signals, More Context</div>';
  html += '<div class="section-deck reveal">We\u2019re building more lenses to give you a fuller picture of what\u2019s happening across your accounts.</div>';
  html += '<div class="coming-grid">';
  [{i:'\uD83C\uDF81',t:'Gifting',d:'See gifting requests and status per account'},
   {i:'\uD83D\uDCE7',t:'Email Volume',d:'Track emails sent per rep per week'},
   {i:'\uD83D\uDCE4',t:'Outbound Activity',d:'Outbound signals from your reps'},
   {i:'\uD83D\uDCC8',t:'Week over Week',d:'See if accounts are trending up or down'}
  ].forEach(function(c) {
    html += '<div class="coming-card reveal"><div class="coming-badge">Coming soon</div>';
    html += '<div class="coming-icon">' + c.i + '</div><div class="coming-title">' + esc(c.t) + '</div>';
    html += '<div class="coming-desc">' + esc(c.d) + '</div></div>';
  });
  html += '</div>';
  html += '<div class="coming-cta reveal">Have an idea or feedback? Reach out to <strong>@Hannah Harrington</strong></div>';
  html += '</div>';

  html += '<footer class="wrap"><div class="footer">CONFIDENTIAL \u2014 SHOPIFY INTERNAL USE ONLY \u00B7 Week of ' + esc(m.week_of) + '</div></footer>';

  $('#masterView').innerHTML = html;
  bindMasterEvents();
}

/* ═══════════════════════════════════════════
   Render: Personal
   ═══════════════════════════════════════════ */
function renderPersonal(sellerId) {
  var seller = DATA.sellers[sellerId];
  var types = Object.keys(DATA.signal_types);
  var m = DATA.meta;
  var firstName = seller.name.split(' ')[0];
  var initials = seller.name.split(' ').map(function(w) { return w.charAt(0); }).join('').substring(0, 2).toUpperCase();

  var nonZeroTypes = types.filter(function(t) { return (seller.summary[t] || 0) > 0; });
  var hotCount = nonZeroTypes.length > 0 ? seller.summary.total : 0;

  var html = '';
  html += '<header><div class="hero-personal">';
  html += '<div class="avatar fade-in" aria-hidden="true">' + esc(initials) + '</div>';
  html += '<h1 class="fade-in fd2">Hey, ' + esc(firstName) + '</h1>';
  html += '<div class="sub-personal fade-in fd3">Here\u2019s your personalized engagement report for the week of <strong>' + esc(m.week_of) + '</strong></div>';
  if (hotCount > 0) {
    html += '<div class="motivator fade-in fd4">\uD83D\uDD25 ' + hotCount + ' signal' + (hotCount !== 1 ? 's' : '') + ' for you this week</div>';
  }
  html += '</div></header>';

  html += '<div class="wrap" style="padding-top:32px;padding-bottom:48px;">';

  if (IDENTITY_ROLE === 'admin' || IDENTITY_ROLE === 'coach') {
    html += '<div class="identity-notice">Previewing <strong>' + esc(seller.name) + '</strong>\u2019s report. <a href="#" id="clearIdentity">\u2190 Back to dashboard</a></div>';
  } else {
    html += '<div class="identity-notice">Viewing as <strong>' + esc(seller.name) + '</strong>. Not you? <a href="#" id="clearIdentity">View all sellers</a></div>';
  }

  // Start-here callout: find best HVP signal or top MQA
  var startHere = null;
  if (seller.signals.hvp && seller.signals.hvp.length > 0) {
    var hvpSig = seller.signals.hvp[0];
    startHere = { title: hvpSig.account + ' is back', body: 'This account was Closed Lost but is visiting Shopify Plus pages again this week. ' + (hvpSig.grade ? 'Grade ' + hvpSig.grade + ' account. ' : '') + 'This is a re-engagement opportunity.' };
  }
  if (startHere) {
    html += '<div class="start-here reveal"><div class="start-here-label">\u2192 Start here</div>';
    html += '<div class="start-here-title">' + esc(startHere.title) + '</div>';
    html += '<div class="start-here-body">' + esc(startHere.body) + '</div></div>';
  }

  // Stat cards with intensity
  var statDefs = types.map(function(t) {
    var st = DATA.signal_types[t];
    return { key: t, num: seller.summary[t] || 0, label: st.short_label, cls: TYPE_CLS[t] || t, vibe: STAT_VIBES[t] || '' };
  });
  var maxStat = Math.max.apply(null, statDefs.map(function(s) { return s.num; }));

  html += '<div class="stats-grid">';
  statDefs.forEach(function(s) {
    var cardCls;
    if (s.num === 0) cardCls = 'stat-card-muted';
    else if (s.num === maxStat) cardCls = 'stat-card-high-' + s.cls;
    else cardCls = 'stat-card-low-' + s.cls;
    html += '<div class="stat-card ' + cardCls + ' reveal">';
    if (s.num === maxStat && s.num > 0) html += '<span class="stat-crown">\u2B50</span>';
    html += '<div class="stat-num stat-num-' + s.cls + '">' + s.num + '</div>';
    html += '<div class="stat-label">' + esc(s.label) + '</div>';
    html += '<div class="stat-vibe">' + (s.num === 0 ? 'nothing this week \u2014 check back Monday' : s.vibe) + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Signal sections
  var hasAnyData = false;
  types.forEach(function(t) {
    var signals = seller.signals[t];
    if (!signals || signals.length === 0) return;
    hasAnyData = true;
    var st = DATA.signal_types[t];
    var cls = TYPE_CLS[t] || t;
    var cols = st.display_columns;
    var def = SIGNAL_DEFS[t];

    html += '<div class="signal-section reveal">';
    html += '<div class="signal-heading"><span class="badge badge-' + cls + '">' + esc(st.short_label) + '</span> ' + esc(st.label) + ' <button class="help-btn" data-help="' + t + '" aria-label="What is ' + esc(st.short_label) + '?">?</button></div>';
    if (def) html += '<div class="signal-desc">' + esc(def.a) + '</div>';

    html += '<div class="table-wrap"><table class="data-table"><thead><tr>';
    cols.forEach(function(c) { html += '<th>' + esc(c.label) + '</th>'; });
    html += '</tr></thead><tbody>';

    signals.forEach(function(row) {
      html += '<tr>';
      cols.forEach(function(c) { html += '<td>' + esc(row[c.key]) + '</td>'; });
      html += '</tr>';

      // HVP row explanation
      if (t === 'hvp') {
        html += '<tr class="row-explain"><td colspan="' + cols.length + '"><div class="row-explain-inner">';
        html += '<span>You lost this deal but they\u2019re back on Plus pages this week. Good time to reopen the conversation.</span>';
        html += '</div></td></tr>';
      }
      // Activity row explanation
      if (t === 'activity' && row.category) {
        var actExplain = '';
        var cat = (row.category || '').toLowerCase();
        if (cat.indexOf('high intent') !== -1) actExplain = 'They submitted a high-intent contact form \u2014 this is a strong buying signal.';
        else if (cat.indexOf('event') !== -1) actExplain = 'They attended or engaged with an event \u2014 a good reason to follow up.';
        if (actExplain) {
          html += '<tr class="row-explain"><td colspan="' + cols.length + '"><div class="row-explain-inner"><span>' + esc(actExplain) + '</span></div></td></tr>';
        }
      }
    });

    html += '</tbody></table></div></div>';
  });

  if (!hasAnyData) {
    html += '<div style="text-align:center;color:var(--text-3);padding:48px 0;font-size:15px;">No engagement signals for your accounts this week.</div>';
  }

  html += '<footer class="footer">CONFIDENTIAL \u2014 SHOPIFY INTERNAL USE ONLY \u00B7 Week of ' + esc(m.week_of) + '</footer>';
  html += '</div>';

  $('#personalView').innerHTML = html;
  $('#clearIdentity').addEventListener('click', function(e) { e.preventDefault(); clearSeller(); showMaster(); });
  bindHelpButtons();
}

/* ═══════════════════════════════════════════
   Events
   ═══════════════════════════════════════════ */
function activateOnKey(el, fn) {
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fn.call(this, e); }
  });
}

function bindMasterEvents() {
  $$('.seller-card').forEach(function(c) {
    var handler = function() { var sid = this.dataset.seller; if (sid) showSeller(sid); };
    c.addEventListener('click', handler);
    activateOnKey(c, handler);
  });
  $$('.top-owner').forEach(function(el) {
    var handler = function() { var sid = this.dataset.seller; if (sid) showSeller(sid); };
    el.addEventListener('click', handler);
    activateOnKey(el, handler);
  });
  $$('.archive-link').forEach(function(el) {
    var handler = function() { var w = this.dataset.week; if (w) loadWeek(w); };
    el.addEventListener('click', handler);
    activateOnKey(el, handler);
  });
  $$('.filter-tag').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      if (e.target.classList.contains('help-btn')) return;
      $$('.filter-tag').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      ACTIVE_FILTER = this.dataset.filter || 'all';
      var searchVal = $('#hubSearch') ? $('#hubSearch').value.toLowerCase().trim() : '';
      applyCardFilters(searchVal);
    });
  });
  var backBtn = $('#backToCurrentBtn');
  if (backBtn) {
    backBtn.addEventListener('click', function() { loadWeek(LATEST_WEEK); });
  }
  initSearch();
  bindHelpButtons();
}

function bindHelpButtons() {
  $$('.help-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); openModal(this.dataset.help); });
  });
}

function initSearch() {
  var input = $('#hubSearch');
  var results = $('#searchResults');
  if (!input || !results) return;
  var sellerList = Object.keys(DATA.sellers).map(function(sid) {
    var s = DATA.sellers[sid];
    var pills = Object.keys(DATA.signal_types).filter(function(t) { return s.summary[t] > 0; });
    return { id: sid, name: s.name, pills: pills };
  });
  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    if (!q) { results.classList.remove('active'); results.innerHTML = ''; applyCardFilters(''); return; }
    window.scrollTo({ top: 0, behavior: 'smooth' });
    var matches = sellerList.filter(function(s) { return s.name.toLowerCase().indexOf(q) !== -1; });
    if (matches.length > 0) {
      results.innerHTML = matches.map(function(s) {
        var pillsHtml = s.pills.map(function(t) {
          return '<span class="pill ' + pillCls(t) + '" style="font-size:11px;padding:2px 8px;">' + DATA.signal_types[t].short_label + '</span>';
        }).join('');
        return '<div class="sr-item" data-seller="' + esc(s.id) + '"><span class="sr-name">' + esc(s.name) + '</span><span class="sr-pills">' + pillsHtml + '</span></div>';
      }).join('');
    } else {
      results.innerHTML = '<div class="sr-empty">No sellers match \u201C' + esc(q) + '\u201D</div>';
    }
    results.classList.add('active');
    applyCardFilters(q);
  });
  input.addEventListener('focus', function() { if (this.value.trim()) this.dispatchEvent(new Event('input')); });
  results.addEventListener('click', function(e) {
    var item = e.target.closest('.sr-item');
    if (item && item.dataset.seller) showSeller(item.dataset.seller);
  });
  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !results.contains(e.target)) results.classList.remove('active');
  });
}

function applyCardFilters(q) {
  var visible = 0;
  $$('.seller-card').forEach(function(card) {
    var nameMatch = !q || card.dataset.name.indexOf(q) !== -1;
    var typeMatch = ACTIVE_FILTER === 'all' || card.dataset.types.indexOf(ACTIVE_FILTER) !== -1;
    var show = nameMatch && typeMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  var nr = $('#noResults');
  if (nr) nr.style.display = visible === 0 ? 'block' : 'none';
}

function loadWeek(week) {
  var isLatest = !week || week === LATEST_WEEK;
  var url = isLatest ? 'data/current.json' : 'data/' + week + '.json';

  $('#masterView').style.opacity = '0.4';
  $('#masterView').style.pointerEvents = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  fetch(url + '?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      DATA = data;
      CURRENT_WEEK = data.meta.week_of;
      document.title = 'Weekly Sales Insights \u2014 ' + CURRENT_WEEK;
      var params = new URLSearchParams(location.search);
      if (isLatest) { params.delete('week'); } else { params.set('week', week); }
      params.delete('seller');
      var qs = params.toString();
      history.pushState(null, '', location.pathname + (qs ? '?' + qs : ''));
      CURRENT_SELLER = null;
      showMaster();
      $('#masterView').style.opacity = '';
      $('#masterView').style.pointerEvents = '';
    })
    .catch(function() {
      alert('Could not load data for week ' + week);
      $('#masterView').style.opacity = '';
      $('#masterView').style.pointerEvents = '';
    });
}

function initReveal() {
  function check() {
    document.querySelectorAll('.reveal:not(.visible)').forEach(function(el) {
      if (el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
    });
  }
  check(); setTimeout(check, 100); setTimeout(check, 400);
  window.removeEventListener('scroll', scrollRevealHandler);
  window.addEventListener('scroll', scrollRevealHandler, { passive: true });
}
function scrollRevealHandler() {
  document.querySelectorAll('.reveal:not(.visible)').forEach(function(el) {
    if (el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
  });
}

window.addEventListener('scroll', function() {
  var ring = document.getElementById('progressRing');
  if (!ring) return;
  var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
  pct = Math.min(Math.max(pct, 0), 1);
  ring.style.strokeDashoffset = 113 - (113 * pct);
}, { passive: true });

$('#themeToggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});

$('#modalClose').addEventListener('click', closeModal);
$('#modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Tab' && $('#modalOverlay').classList.contains('open')) {
    var focusable = $('#modalBox').querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
function init() {
  var params = new URLSearchParams(location.search);
  var weekParam = params.get('week');
  var dataUrl = weekParam ? 'data/' + weekParam + '.json' : 'data/current.json';
  var bust = '?v=' + Date.now();

  Promise.all([
    fetch(dataUrl + bust).then(function(r) { return r.json(); }),
    fetch('data/weeks.json' + bust).then(function(r) { return r.json(); }).catch(function() { return []; }),
    fetchIAPEmail()
  ]).then(function(results) {
    DATA = results[0];
    WEEKS = results[1];
    IAP_EMAIL = results[2];
    CURRENT_WEEK = DATA.meta.week_of;
    if (!LATEST_WEEK) LATEST_WEEK = WEEKS.length > 0 ? WEEKS[0] : CURRENT_WEEK;
    document.title = 'Weekly Sales Insights \u2014 ' + CURRENT_WEEK;

    if (IAP_EMAIL) resolveRole(IAP_EMAIL);
    console.log('[Identity] Routing \u2014 role:', IDENTITY_ROLE, '| email:', IAP_EMAIL);

    $('#loadingView').style.display = 'none';

    var sellerId = resolveIdentity();
    if (sellerId) { showSeller(sellerId); }
    else { showMaster(); }
  }).catch(function(err) {
    $('#loadingView').innerHTML = '<p style="color:var(--rose);">Failed to load data. Check that data/current.json exists.</p>';
    console.error(err);
  });
}

init();

})();
</script>
