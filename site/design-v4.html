<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V4 — Warm &amp; Human | Weekly Sales Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fefcf9;
  --bg-card: #ffffff;
  --bg-muted: #f5f4f1;
  --accent: #008060;
  --accent-light: #edf8f3;
  --accent-soft: #b8e6d0;
  --accent2: #5c6ac4;
  --accent2-light: #f0f1fc;
  --accent2-soft: #c8ccf0;
  --warm: #d97706;
  --warm-light: #fef8ee;
  --warm-soft: #fcd980;
  --rose: #be185d;
  --rose-light: #fef1f6;
  --rose-soft: #f5b8d4;
  --text-1: #2d2a26;
  --text-2: #5c5852;
  --text-3: #9c9689;
  --border: #ece8e1;
  --shadow: 0 2px 10px rgba(45,42,38,.05), 0 1px 3px rgba(45,42,38,.04);
  --shadow-lg: 0 8px 28px rgba(45,42,38,.08), 0 4px 10px rgba(45,42,38,.04);
  --shadow-warm: 0 4px 16px rgba(217,119,6,.06);
  --font: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --max-w: 1060px;
  --radius: 16px;
  --radius-sm: 12px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  font-size: 16px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.progress-ring-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  width: 44px; height: 44px;
}
.progress-ring { transform: rotate(-90deg); }
.progress-ring-bg { stroke: var(--border); }
.progress-ring-fill {
  stroke: var(--accent); stroke-dasharray: 113; stroke-dashoffset: 113;
  transition: stroke-dashoffset 80ms linear;
}

.view-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 200;
  display: flex; gap: 4px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 28px;
  padding: 4px; box-shadow: var(--shadow);
}
.toggle-btn {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 18px; border: none; border-radius: 24px;
  background: transparent; color: var(--text-3); cursor: pointer;
  transition: all .25s ease;
}
.toggle-btn.active { background: var(--accent); color: #fff; }

.wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 28px; }

/* ── MASTER HERO (compact) ── */
.hero-compact {
  text-align: center; padding: 56px 28px 28px; position: relative;
}
.hero-compact::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.hero-compact .hero-greeting {
  font-family: var(--font); font-size: 15px; font-weight: 500;
  color: var(--accent); margin-bottom: 4px;
}
.hero-compact h1 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1;
  color: var(--text-1); letter-spacing: -.02em;
}
.hero-compact .sub {
  font-size: 15px; color: var(--text-2); margin-top: 8px; font-weight: 400; line-height: 1.7;
}
.hero-compact .sub strong { color: var(--accent); }

/* ── PERSONAL HERO ── */
.hero-personal {
  text-align: center; padding: 28px 28px 36px; position: relative;
}
.hero-personal::before {
  content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(0,128,96,.07) 0%,
    rgba(92,106,196,.04) 30%,
    rgba(217,119,6,.03) 50%,
    transparent 70%);
  pointer-events: none;
}
.hero-personal::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-light), var(--accent-soft));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 28px; color: var(--accent);
  margin: 0 auto 16px; box-shadow: 0 4px 20px rgba(0,128,96,.12);
}
.hero-personal h1 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: clamp(2rem, 5vw, 3.2rem); color: var(--text-1);
  letter-spacing: -.02em;
}
.hero-personal .sub-personal {
  font-size: 16px; color: var(--text-2); margin-top: 10px; line-height: 1.7;
}
.hero-personal .sub-personal strong { color: var(--accent); font-weight: 600; }
.hero-personal .motivator {
  display: inline-block; margin-top: 14px; padding: 8px 20px;
  background: var(--accent-light); border-radius: 24px;
  font-size: 14px; font-weight: 500; color: var(--accent);
}

/* ── START HERE CALLOUT ── */
.start-here {
  background: var(--bg-card); border: 1px solid var(--border);
  border-left: 4px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 24px 28px; margin-bottom: 36px;
  box-shadow: var(--shadow);
}
.start-here-label {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.start-here-title {
  font-family: var(--font-serif); font-size: 20px; font-weight: 400;
  color: var(--text-1); margin-bottom: 4px;
}
.start-here-body { font-size: 14px; color: var(--text-2); line-height: 1.7; }

/* ── SECTION HEADERS ── */
.section-wrap { padding: 36px 0; position: relative; }
.section-wrap::after {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.section-wrap:last-of-type::after { display: none; }
.section-emoji { font-size: 24px; margin-bottom: 6px; }
.section-kicker {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: var(--accent); margin-bottom: 4px;
}
.section-head {
  font-family: var(--font-serif); font-size: clamp(1.5rem, 3vw, 2rem);
  font-weight: 400; color: var(--text-1); margin-bottom: 6px;
  letter-spacing: -.01em;
}
.section-deck {
  font-size: 15px; color: var(--text-2); line-height: 1.7;
  max-width: 600px; margin-bottom: 24px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
}
.filter-tag {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 16px; border: 1px solid var(--border);
  border-radius: 24px; background: var(--bg-card);
  color: var(--text-3); cursor: pointer;
  transition: all .2s; box-shadow: var(--shadow);
}
.filter-tag:hover { border-color: var(--accent); color: var(--accent); }
.filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── ? HELP BUTTON (next to signal labels) ── */
.help-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg);
  font-family: var(--font); font-size: 11px; font-weight: 700;
  color: var(--text-3); cursor: pointer; transition: all .15s;
  vertical-align: middle; margin-left: 4px;
}
.help-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(45,42,38,.35);
  backdrop-filter: blur(4px); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 32px 36px; max-width: 480px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  transform: translateY(12px) scale(.98);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
.modal-close {
  float: right; border: none; background: transparent;
  font-size: 20px; color: var(--text-3); cursor: pointer;
  padding: 0; line-height: 1; transition: color .15s;
}
.modal-close:hover { color: var(--text-1); }
.modal-badge { margin-bottom: 12px; }
.modal-title {
  font-family: var(--font-serif); font-size: 22px;
  font-weight: 400; color: var(--text-1); margin-bottom: 12px;
}
.modal-body { font-size: 15px; color: var(--text-2); line-height: 1.8; }

/* ── TOP SIGNALS (single row) ── */
.top-scroll-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
}
.top-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  transition: transform .35s cubic-bezier(.16,1,.3,1), box-shadow .3s;
  min-width: 0;
}
.top-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.top-rank-wrap {
  display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px;
}
.top-rank {
  display: inline-flex; width: 26px; height: 26px; align-items: center;
  justify-content: center; border-radius: 50%; font-size: 12px;
  font-weight: 700; color: #fff;
}
.top-rank-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; padding: 2px 7px; border-radius: 4px;
}
.rank-bg-1 { background: var(--accent); }
.rank-bg-2 { background: var(--rose); }
.rank-bg-3 { background: var(--accent2); }
.rank-bg-4 { background: var(--warm); }
.rank-bg-5 { background: var(--accent); }
.rank-label-hvp { background: var(--rose-light); color: var(--rose); }
.rank-label-mqa { background: var(--accent-light); color: var(--accent); }
.top-title {
  font-family: var(--font-serif); font-size: 17px; font-weight: 400;
  color: var(--text-1); margin-bottom: 4px; line-height: 1.3;
}
.top-meta { font-size: 13px; color: var(--text-2); margin-bottom: 3px; }
.top-kw { font-size: 12px; color: var(--warm); font-style: italic; margin-bottom: 6px; }
.top-owner { font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; }
.top-owner:hover { text-decoration: underline; }

/* ── SELLER GRID ── */
.sellers-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
}
.seller-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s, border-color .3s;
}
.seller-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent-soft); }
.seller-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.seller-name { font-family: var(--font-serif); font-size: 19px; font-weight: 400; }
.seller-total {
  font-size: 12px; font-weight: 600; color: var(--accent);
  padding: 2px 10px; background: var(--accent-light); border-radius: 10px;
}
.seller-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.pill-mqa { background: var(--accent-light); color: var(--accent); }
.pill-hvp { background: var(--rose-light); color: var(--rose); }
.pill-people { background: var(--accent2-light); color: var(--accent2); }
.pill-activity { background: var(--warm-light); color: var(--warm); }

/* ── COMING SOON ── */
.coming-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.coming-card {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 24px; background: var(--bg-muted); position: relative;
  opacity: .8;
}
.coming-icon { font-size: 28px; margin-bottom: 8px; }
.coming-title {
  font-family: var(--font-serif); font-size: 18px; font-weight: 400;
  color: var(--text-1); margin-bottom: 4px;
}
.coming-desc { font-size: 14px; color: var(--text-3); line-height: 1.6; }
.coming-badge {
  position: absolute; top: 16px; right: 16px;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
  text-transform: uppercase; padding: 3px 10px; border-radius: 10px;
  background: var(--border); color: var(--text-3); font-weight: 500;
}
.coming-cta {
  margin-top: 20px; font-size: 14px; color: var(--text-3); font-style: italic;
}
.coming-cta strong { color: var(--accent); font-style: normal; }

/* ── STAT CARDS (intensity-driven) ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 36px;
}
.stat-card {
  border-radius: var(--radius); padding: 24px 16px; text-align: center;
  box-shadow: var(--shadow); transition: transform .25s ease;
  position: relative;
}
.stat-card:hover { transform: scale(1.03); }
.stat-card-muted {
  background: var(--bg-muted); opacity: .6;
}
.stat-card-muted .stat-num { color: var(--text-3) !important; }
.stat-card-muted .stat-label { color: var(--text-3); }
.stat-card-muted .stat-vibe { color: var(--text-3); }
.stat-card-low-mqa { background: var(--accent-light); }
.stat-card-low-hvp { background: var(--rose-light); }
.stat-card-low-people { background: var(--accent2-light); }
.stat-card-low-activity { background: var(--warm-light); }
.stat-card-high-mqa { background: linear-gradient(145deg, var(--accent-light), var(--accent-soft)); box-shadow: 0 4px 20px rgba(0,128,96,.12); }
.stat-card-high-hvp { background: linear-gradient(145deg, var(--rose-light), var(--rose-soft)); box-shadow: 0 4px 20px rgba(190,24,93,.1); }
.stat-card-high-people { background: linear-gradient(145deg, var(--accent2-light), var(--accent2-soft)); box-shadow: 0 4px 20px rgba(92,106,196,.1); }
.stat-card-high-activity { background: linear-gradient(145deg, var(--warm-light), var(--warm-soft)); box-shadow: 0 4px 20px rgba(217,119,6,.1); }
.stat-crown {
  position: absolute; top: -8px; right: -4px; font-size: 18px;
}
.stat-num { font-family: var(--font-serif); font-size: 44px; font-weight: 400; line-height: 1; }
.stat-num-mqa { color: var(--accent); }
.stat-num-hvp { color: var(--rose); }
.stat-num-people { color: var(--accent2); }
.stat-num-activity { color: var(--warm); }
.stat-label { font-size: 13px; color: var(--text-2); margin-top: 6px; font-weight: 500; }
.stat-vibe { font-size: 11px; color: var(--text-3); margin-top: 2px; font-style: italic; }

/* ── DATA TABLES (with row explanations + WoW) ── */
.signal-section { margin-bottom: 40px; }
.signal-heading {
  font-family: var(--font-serif); font-size: 22px; font-weight: 400;
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.signal-desc { font-size: 14px; color: var(--text-3); margin-bottom: 14px; line-height: 1.7; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-mqa { background: var(--accent-light); color: var(--accent); }
.badge-hvp { background: var(--rose-light); color: var(--rose); }
.badge-people { background: var(--accent2-light); color: var(--accent2); }
.badge-activity { background: var(--warm-light); color: var(--warm); }

.data-table {
  width: 100%; border-collapse: collapse; font-size: 14px;
  background: var(--bg-card); border-radius: var(--radius-sm);
  overflow: hidden; box-shadow: var(--shadow);
}
.data-table th {
  background: var(--bg); text-align: left; padding: 12px 16px;
  border-bottom: 2px solid var(--border);
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  letter-spacing: .04em; color: var(--text-2);
}
.data-table td {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.6;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,128,96,.03); }
.data-table tr.row-repeat { border-left: 3px solid var(--warm-soft); }
.data-table tr.row-repeat td:first-child { padding-left: 13px; }

.row-explain {
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.row-explain td {
  padding: 8px 16px 10px !important; border-bottom: 1px solid var(--border) !important;
}
.row-explain-inner {
  font-size: 13px; color: var(--text-3); font-style: italic;
  line-height: 1.6; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.wow-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; font-style: normal;
  padding: 2px 8px; border-radius: 10px;
}
.wow-repeat {
  background: var(--warm-light); color: var(--warm);
}
.wow-up {
  background: var(--accent-light); color: var(--accent);
}
.wow-down {
  background: var(--bg-muted); color: var(--text-3);
}

/* ── ARCHIVE ── */
.archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.archive-link {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 15px; font-weight: 500;
  box-shadow: var(--shadow); cursor: pointer; transition: all .2s;
}
.archive-link:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow-lg); }

/* ── IDENTITY NOTICE ── */
.identity-notice {
  background: var(--accent-light); border-radius: var(--radius-sm);
  padding: 12px 20px; font-size: 14px; color: var(--text-2);
  margin-bottom: 28px; text-align: center;
}
.identity-notice a { color: var(--accent); font-weight: 600; }

/* ── FOOTER ── */
.footer {
  text-align: center; font-size: 12px; color: var(--text-3);
  padding: 36px 0 56px; border-top: 1px solid var(--border); margin-top: 24px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px) scale(.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.fade-in { animation: fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
.fd2 { animation-delay: .12s; }
.fd3 { animation-delay: .24s; }
.fd4 { animation-delay: .36s; }
.reveal {
  opacity: 0; transform: translateY(20px) scale(.99);
  transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
}
.reveal.visible { opacity: 1; transform: translateY(0) scale(1); }

@media (prefers-reduced-motion: reduce) {
  .fade-in, .reveal { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
}

@media (max-width: 900px) {
  .top-scroll-row {
    display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; gap: 12px; padding-bottom: 8px;
  }
  .top-scroll-row::-webkit-scrollbar { display: none; }
  .top-card { min-width: 240px; flex-shrink: 0; scroll-snap-align: start; }
}
@media (max-width: 700px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .sellers-grid { grid-template-columns: 1fr; }
  .coming-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<svg class="progress-ring-wrap" viewBox="0 0 40 40">
  <circle class="progress-ring-bg" cx="20" cy="20" r="18" fill="none" stroke-width="2" />
  <circle class="progress-ring progress-ring-fill" id="progressRing" cx="20" cy="20" r="18" fill="none" stroke-width="2.5" stroke-linecap="round" />
</svg>

<div class="view-toggle">
  <button class="toggle-btn active" id="togMaster">Dashboard</button>
  <button class="toggle-btn" id="togSeller">Seller View</button>
</div>

<div id="masterView"></div>
<div id="personalView" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
(function() {
'use strict';

var SELLERS = [
  { id:'alexandre_saroian', name:'Alexandre Saroian', mqa:3, hvp:1, people:2, activity:8, total:14 },
  { id:'anthony_anastasi', name:'Anthony Anastasi', mqa:4, hvp:1, people:3, activity:4, total:12 },

function bindMasterEvents() {
  $$('.seller-card').forEach(function(c) { c.addEventListener('click', function() { switchView('seller'); }); });
  $$('.top-owner').forEach(function(c) { c.addEventListener('click', function() { switchView('seller'); }); });
  $$('.filter-tag').forEach(function(b) {
    b.addEventListener('click', function(e) {
      if (e.target.classList.contains('help-btn')) return;
      $$('.filter-tag').forEach(function(x) { x.classList.remove('active'); });
      this.classList.add('active');
    });
  });
  bindHelpButtons();
}

function bindHelpButtons() {
  $$('.help-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      openModal(this.dataset.help);
    });
  });
}

function switchView(view) {
  if (view === 'seller') {
    renderPersonal();
    $('#masterView').style.display = 'none';
    $('#personalView').style.display = 'block';
    $('#togMaster').classList.remove('active');
    $('#togSeller').classList.add('active');
  } else {
    renderMaster();
    $('#personalView').style.display = 'none';
    $('#masterView').style.display = 'block';
    $('#togSeller').classList.remove('active');
    $('#togMaster').classList.add('active');
  }
  window.scrollTo(0, 0);
}

function initReveal() {
  function check() {
    document.querySelectorAll('.reveal:not(.visible)').forEach(function(el) {
      if (el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
    });
  }
  check(); setTimeout(check, 100); setTimeout(check, 400);
  window.addEventListener('scroll', check, { passive: true });
}

// Progress ring
window.addEventListener('scroll', function() {
  var ring = document.getElementById('progressRing');
  if (!ring) return;
  var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
  pct = Math.min(Math.max(pct, 0), 1);
  ring.style.strokeDashoffset = 113 - (113 * pct);
}, { passive: true });

// Modal close handlers
$('#modalClose').addEventListener('click', closeModal);
$('#modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
