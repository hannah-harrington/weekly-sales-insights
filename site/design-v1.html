<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --bg-card: #ffffff;
  --accent: #008060;
  --accent-light: #e6f5ef;
  --accent2: #5c6ac4;
  --accent2-light: #eef0fb;
  --warm: #d97706;
  --warm-light: #fef3c7;
  --rose: #be185d;
  --rose-light: #fce7f3;
  --text-1: #1a1a2e;
  --text-2: #4a4a68;
  --text-3: #8a8aa3;
  --border: #e8e6e1;
  --rule: #d4d0c8;
  --shadow: 0 2px 8px rgba(26,26,46,.04);
  --shadow-lg: 0 8px 24px rgba(26,26,46,.07);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --max-w: 820px;
  --radius: 4px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  font-size: 16px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.progress-track {
  position: fixed; left: 0; top: 0; width: 2px; height: 100vh;
  background: var(--border); z-index: 300;
}
.progress-fill { width: 100%; height: 0%; background: var(--accent); transition: height 80ms linear; }

/* Toggle */
.view-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 200;
  display: flex; gap: 2px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 28px; padding: 3px; box-shadow: var(--shadow);
}
.toggle-btn {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 7px 18px; border: none; border-radius: 24px;
  background: transparent; color: var(--text-3); cursor: pointer;
  transition: all .3s ease;
}
.toggle-btn.active { background: var(--text-1); color: #fff; }

.wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 32px; }

/* Editorial rule dividers */
.rule {
  border: none; border-top: 1px solid var(--rule);
  margin: 56px auto; max-width: 120px;
}
.rule-wide { max-width: 100%; margin: 48px 0; }

/* ── HERO ── */
.hero {
  text-align: center; padding: 100px 32px 56px;
}
.hero-kicker {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 4px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 24px;
}
.hero h1 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: clamp(3rem, 7vw, 5rem); line-height: 1.05;
  letter-spacing: -.03em; color: var(--text-1);
}
.hero .edition {
  font-family: var(--font-serif); font-style: italic;
  font-size: 20px; color: var(--text-2); margin-top: 16px;
  letter-spacing: .01em;
}
.hero .dateline {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text-3); margin-top: 12px; letter-spacing: 1px;
}

/* Personal hero */
.hero-personal .back-link {
  display: inline-block; font-size: 14px; color: var(--text-3);
  margin-bottom: 24px; transition: color .2s;
}
.hero-personal .back-link:hover { color: var(--accent); }
.hero-personal h1 {
  font-style: italic; font-size: clamp(2.5rem, 6vw, 4rem);
}
.hero-personal .byline {
  font-family: var(--font); font-size: 16px; color: var(--text-2);
  margin-top: 12px; font-weight: 400;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  padding: 24px 0;
}
.filter-tag {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; padding: 6px 16px;
  border: 1px solid var(--border); border-radius: 2px;
  background: transparent; color: var(--text-3);
  cursor: pointer; transition: all .2s;
}
.filter-tag:hover { border-color: var(--text-2); color: var(--text-2); }
.filter-tag.active { border-color: var(--text-1); color: var(--text-1); background: var(--bg-card); }

/* ── TOP SIGNALS ── */
.top-section { padding: 0 0 16px; }
.section-kicker {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 4px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.section-head {
  font-family: var(--font-serif); font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 400; color: var(--text-1); margin-bottom: 8px;
  letter-spacing: -.02em;
}
.section-deck {
  font-size: 15px; color: var(--text-2); line-height: 1.7;
  max-width: 560px; margin-bottom: 36px;
}

.top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.top-item {
  padding: 28px 0; border-bottom: 1px solid var(--border);
  transition: background .3s ease;
}
.top-item:hover { background: rgba(0,128,96,.02); }
.top-grid .top-item:nth-child(odd) { padding-right: 24px; border-right: 1px solid var(--border); }
.top-grid .top-item:nth-child(even) { padding-left: 24px; }
.top-item:last-child, .top-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.top-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); margin-bottom: 6px;
}
.top-name {
  font-family: var(--font-serif); font-size: 22px; font-weight: 400;
  color: var(--text-1); margin-bottom: 4px; line-height: 1.3;
}
.top-meta { font-size: 14px; color: var(--text-2); margin-bottom: 2px; }
.top-kw { font-size: 13px; color: var(--warm); font-style: italic; }
.top-owner { font-size: 13px; color: var(--accent); cursor: pointer; margin-top: 4px; }
.top-owner:hover { text-decoration: underline; }

/* ── ACCORDION DEFINITIONS ── */
.accordion { border-top: 1px solid var(--border); }
.acc-item { border-bottom: 1px solid var(--border); }
.acc-trigger {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; padding: 20px 0; background: transparent; border: none;
  font-family: var(--font-serif); font-size: 19px; font-weight: 400;
  color: var(--text-1); cursor: pointer; text-align: left;
  transition: color .2s;
}
.acc-trigger:hover { color: var(--accent); }
.acc-trigger .badge {
  display: inline-block; padding: 2px 10px; border-radius: 2px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; margin-right: 10px; font-weight: 500;
}
.acc-arrow {
  font-size: 18px; color: var(--text-3); transition: transform .3s ease;
}
.acc-item.open .acc-arrow { transform: rotate(45deg); }
.acc-body {
  max-height: 0; overflow: hidden; transition: max-height .5s cubic-bezier(.16,1,.3,1);
}
.acc-body-inner {
  padding: 0 0 24px; font-size: 15px; color: var(--text-2); line-height: 1.85;
}

/* Badges */
.badge-mqa { background: var(--accent-light); color: var(--accent); }
.badge-hvp { background: var(--rose-light); color: var(--rose); }
.badge-people { background: var(--accent2-light); color: var(--accent2); }
.badge-activity { background: var(--warm-light); color: var(--warm); }

/* ── SELLER GRID ── */
.sellers-grid {
  display: grid; grid-template-columns: 1fr; gap: 0;
}
.seller-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all .3s ease;
}
.seller-row:hover { padding-left: 8px; color: var(--accent); }
.seller-row:last-child { border-bottom: none; }
.seller-name-ed {
  font-family: var(--font-serif); font-size: 19px; font-weight: 400;
}
.seller-right { display: flex; align-items: center; gap: 10px; }
.seller-count {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-3);
}
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 2px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .5px;
  text-transform: uppercase; font-weight: 500;
}
.pill-mqa { background: var(--accent-light); color: var(--accent); }
.pill-hvp { background: var(--rose-light); color: var(--rose); }
.pill-people { background: var(--accent2-light); color: var(--accent2); }
.pill-activity { background: var(--warm-light); color: var(--warm); }

/* ── STAT CARDS (personal) ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}
.stat-cell {
  text-align: center; padding: 32px 16px;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-num { font-family: var(--font-serif); font-size: 48px; font-weight: 400; line-height: 1; }
.stat-label {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-3); margin-top: 8px;
}

/* ── DATA TABLES ── */
.signal-section { margin-bottom: 48px; }
.signal-heading {
  font-family: var(--font-serif); font-size: 24px; font-weight: 400;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px; color: var(--text-1);
}
.signal-desc { font-size: 14px; color: var(--text-3); margin-bottom: 16px; line-height: 1.7; }
.data-table {
  width: 100%; border-collapse: collapse; font-size: 14px;
}
.data-table th {
  text-align: left; padding: 10px 12px;
  border-bottom: 2px solid var(--text-1);
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-2); font-weight: 500;
}
.data-table td {
  padding: 12px; border-bottom: 1px solid var(--border);
  color: var(--text-1); line-height: 1.6; vertical-align: top;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,128,96,.02); }

/* ── ARCHIVE ── */
.archive-list { list-style: none; }
.archive-list li {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 15px; color: var(--text-1); cursor: pointer;
  transition: color .2s;
}
.archive-list li:hover { color: var(--accent); }
.archive-list li span:last-child { color: var(--text-3); font-size: 14px; }

/* ── FOOTER ── */
.footer {
  text-align: center; font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); padding: 48px 0 64px;
}

/* ── IDENTITY NOTICE ── */
.identity-notice {
  font-size: 14px; color: var(--text-3); font-style: italic;
  margin-bottom: 32px;
}
.identity-notice a { color: var(--accent); font-style: normal; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 1s cubic-bezier(.16,1,.3,1) both; }
.fd2 { animation-delay: .15s; }
.fd3 { animation-delay: .3s; }
.fd4 { animation-delay: .45s; }
.reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s ease, transform .9s cubic-bezier(.16,1,.3,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (prefers-reduced-motion: reduce) {
  .fade-in, .reveal { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
}

@media (max-width: 700px) {
  .top-grid { grid-template-columns: 1fr; }
  .top-grid .top-item:nth-child(odd) { padding-right: 0; border-right: none; }
  .top-grid .top-item:nth-child(even) { padding-left: 0; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stat-cell:nth-child(2) { border-right: none; }
}
</style>
</head>

function bindMasterEvents() {
  $$('.seller-row').forEach(function(el) {
    el.addEventListener('click', function() { switchView('seller'); });
  });
  $$('.top-owner').forEach(function(el) {
    el.addEventListener('click', function() { switchView('seller'); });
  });
  $$('.acc-trigger').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var item = this.parentElement;
      var body = item.querySelector('.acc-body');
      if (item.classList.contains('open')) {
        item.classList.remove('open');
        body.style.maxHeight = '0';
      } else {
        item.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
      }
    });
  });
  $$('.filter-tag').forEach(function(btn) {
    btn.addEventListener('click', function() {
      $$('.filter-tag').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
    });
  });
}

function switchView(view) {
  if (view === 'seller') {
    renderPersonal();
    $('#masterView').style.display = 'none';
    $('#personalView').style.display = 'block';
    $('#togMaster').classList.remove('active');
    $('#togSeller').classList.add('active');
  } else {
    renderMaster();
    $('#personalView').style.display = 'none';
    $('#masterView').style.display = 'block';
    $('#togSeller').classList.remove('active');
    $('#togMaster').classList.add('active');
  }
  window.scrollTo(0, 0);
}

function initReveal() {
  function check() {
    document.querySelectorAll('.reveal:not(.visible)').forEach(function(el) {
      if (el.getBoundingClientRect().top < window.innerHeight * 0.95) el.classList.add('visible');
    });
  }
  check(); setTimeout(check, 100); setTimeout(check, 400);
  window.addEventListener('scroll', check, { passive: true });
}

window.addEventListener('scroll', function() {
  var fill = document.getElementById('progressFill');
  if (!fill) return;
  var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
  fill.style.height = Math.min(pct, 100) + '%';
}, { passive: true });

$('#togMaster').addEventListener('click', function() { switchView('master'); });
$('#togSeller').addEventListener('click', function() { switchView('seller'); });

renderMaster();

})();
</script>
